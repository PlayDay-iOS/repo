[repo]
name = "PlayDay iOS Repo"
url  = "https://playday-ios.github.io/repo/"

[metadata]
origin        = "PlayDay-iOS"
label         = "PlayDay-iOS"
suites        = ["stable", "beta"] # keep in sync with target_suite options in import-org-packages.yml
component     = "main"
architectures = ["iphoneos-arm", "iphoneos-arm64", "all"]
description   = "APT repository for iOS packages published by PlayDay."

[github]
# org_name is required for `repotool import`. Overridable via ORG_NAME env.
org_name = "PlayDay-iOS"

[hosting]
# .deb payloads are uploaded to GitHub Releases by `repotool publish-pool`.
# Packages stanzas reference absolute download URLs from these releases.
# owner defaults to github.org_name; repo defaults to the cwd basename.
tag_prefix = "pool-"
