name: Import Org .deb Packages

on:
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:
    inputs:
      target_suite:
        description: "Target suite for imported packages"
        required: false
        default: "stable"
        type: string
      include_prereleases:
        description: "Include prerelease assets"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - "org-import-allowlist.txt"
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/import-org-packages.yml"

permissions:
  contents: write
  actions: write

concurrency:
  group: import-packages
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          cache: true

      - name: Build repotool
        run: go build -trimpath -o repotool ./cmd/repotool

      - name: Import allow-listed packages
        env:
          GH_TOKEN: ${{ secrets.ORG_REPO_READ_TOKEN }}
          TARGET_SUITE: ${{ inputs.target_suite || 'stable' }}
          INCLUDE_PRERELEASES: ${{ inputs.include_prereleases || 'false' }}
        run: ./repotool import

      - name: Commit imported packages
        id: commit
        run: |
          git add -- pool/
          if git diff --cached --quiet -- pool; then
            echo "No package changes to commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git commit -m "chore(repo): import allow-listed org packages"

          pushed=false
          for i in 1 2 3; do
            git pull --rebase origin main && git push && pushed=true && break
            echo "Push attempt $i failed, retrying..."
            sleep $(( (RANDOM % 5) + 3 ))
          done
          if [ "$pushed" != "true" ]; then
            echo "All push attempts failed"
            exit 1
          fi
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger build workflow
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run build-and-deploy.yml --ref main
