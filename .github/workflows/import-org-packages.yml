name: Import Org .deb Packages

on:
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:
    inputs:
      target_suite:
        description: "Target suite for imported packages"
        required: false
        default: "stable"
        type: choice
        options:
          - "stable"
          - "beta"
      include_prereleases:
        description: "Include prerelease assets"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches:
      - main
    paths:
      - "org-import-allowlist.txt"
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/import-org-packages.yml"

permissions:
  contents: write

concurrency:
  group: import-packages
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Build repotool
        run: go build -o repotool ./cmd/repotool

      - name: Import allow-listed packages
        env:
          GH_TOKEN: ${{ secrets.ORG_REPO_READ_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          TARGET_SUITE: ${{ inputs.target_suite || 'stable' }}
          INCLUDE_PRERELEASES: ${{ inputs.include_prereleases || 'false' }}
        run: ./repotool import

      - name: Commit imported packages
        run: |
          if git diff --quiet -- pool; then
            echo "No package changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add pool
          git commit -m "chore(repo): import allow-listed org packages"

          pushed=false
          for i in 1 2 3; do
            git pull --rebase origin main && git push && pushed=true && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
          if [ "$pushed" != "true" ]; then
            echo "All push attempts failed"
            exit 1
          fi
